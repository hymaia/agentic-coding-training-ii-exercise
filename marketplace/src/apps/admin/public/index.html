<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hymaia Admin Review Inbox</title>
    <meta
      name="description"
      content="A thread-based admin review inbox for accepted consensus findings."
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">Developer tool</p>
          <h1>Admin review inbox</h1>
        </div>
        <div class="status-pill" id="api-status">Connecting…</div>
      </header>

      <main class="content">
        <section class="inbox-block">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Threads</p>
              <h2>Accepted findings</h2>
            </div>
            <div class="summary-strip" aria-label="Inbox summary">
              <div class="summary-card">
                <span class="summary-label">Threads</span>
                <strong id="thread-count">--</strong>
              </div>
              <div class="summary-card" id="open-count-card">
                <span class="summary-label">Awaiting reply</span>
                <strong id="open-count">--</strong>
              </div>
              <div class="summary-text" id="results-count">Loading threads...</div>
            </div>
          </div>
          <div class="chat-layout">
            <aside class="thread-list" id="thread-list" aria-label="Review threads"></aside>
            <section class="thread-panel" id="thread-panel" aria-live="polite">
              <div class="empty-state">
                <p class="eyebrow">Select a thread</p>
                <h3>Review details will appear here.</h3>
                <p>Each thread maps to one accepted line-level finding.</p>
              </div>
            </section>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
